name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0, v1.2, etc.
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Linux system dependencies (tkinter)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --windowed main.py

    # Rename the files so they are easy to identify in the release
    - name: Rename binaries
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          mv dist/main.exe dist/myapp-windows.exe
        elif [ "${{ runner.os }}" == "macOS" ]; then
          mv dist/main dist/myapp-macos
        else
          mv dist/main dist/myapp-linux
        fi

    - name: Upload artifacts for release
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.os }}
        path: dist/myapp-*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required permission to create releases

    steps:
    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-files
        merge-multiple: true # Flattens all downloaded files into one folder

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-files/*
        generate_release_notes: true # Automatically generates notes from your commits/PRs
