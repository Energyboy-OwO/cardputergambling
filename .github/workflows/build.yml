name: Build and Release Gamblinginator3000

on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Linux system dependencies (tkinter)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build executable with PyInstaller
      run: |
        # --name sets the internal name of the executable
        pyinstaller --onefile --windowed --name gamblinginator3000 main.py

    - name: Rename binaries for release
      shell: bash
      run: |
        # Create a clean folder for artifacts
        mkdir -p final-dist
        
        if [ "${{ runner.os }}" == "Windows" ]; then
          mv dist/gamblinginator3000.exe final-dist/gamblinginator3000-windows.exe
        elif [ "${{ runner.os }}" == "macOS" ]; then
          mv dist/gamblinginator3000 final-dist/gamblinginator3000-macos
        else
          mv dist/gamblinginator3000 final-dist/gamblinginator3000-linux
        fi

    - name: Upload artifacts for release
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.os }}
        path: final-dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all build artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-files
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-files/*
        generate_release_notes: true
