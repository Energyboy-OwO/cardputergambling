name: Build Executables

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Tkinter is built-in on Windows/Mac, but NOT on Linux GitHub runners.
    # This step installs the required system package for Linux.
    - name: Install Linux system dependencies (tkinter)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build executable with PyInstaller
      run: |
        # --onefile: Creates a single .exe/binary file
        # --windowed: Hides the terminal/console (perfect for Tkinter apps)
        pyinstaller --onefile --windowed main.py

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ runner.os }}
        path: dist/
